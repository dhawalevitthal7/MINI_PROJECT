services:
  - type: web
    name: queryvista-sqlai
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r SQLAI/requirements.txt"
    startCommand: "cd SQLAI && uvicorn app2:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CACHE_DB_URL
        sync: false
